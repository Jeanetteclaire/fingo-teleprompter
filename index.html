<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Fingo Teleprompter</title>

  <!-- Manrope from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      color: #f5f5f5;
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== Prompter layer ===== */

    #camera {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      filter: blur(4px);
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    #camera.active {
      opacity: 1;
    }

    .tint {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      opacity: 0;
      transition: opacity 0.6s ease;
      z-index: 1;
      pointer-events: none;
    }

    .tint.active {
      opacity: 1;
    }

    /* Script viewport contains the scrolling text. Padding-top places the
       first line in the upper reading zone (~35% from top of screen). */
    .script-viewport {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 35vh;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .script-viewport.active {
      opacity: 1;
    }

    .script-content {
      width: 85%;
      max-width: 600px;
      text-align: center;
      font-weight: 500;
      font-size: 44px;
      line-height: 1.5;
      letter-spacing: 0.01em;
      color: #f5f5f5;
      white-space: pre-wrap;
      will-change: transform;
    }

    /* Tap zone — invisible, covers the screen, handles play/pause clicks */
    .tap-zone {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      background: transparent;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    .tap-zone.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* Edit button — sits above the tap zone */
    .edit-button {
      position: fixed;
      top: 1rem;
      left: 1rem;
      padding: 0.5rem 1rem;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(245, 245, 245, 0.2);
      border-radius: 999px;
      color: #f5f5f5;
      font: inherit;
      font-size: 0.875rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      cursor: pointer;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.4s ease, border-color 0.2s ease;
      pointer-events: none;
    }

    .edit-button.active {
      opacity: 0.7;
      pointer-events: auto;
    }

    .edit-button:active {
      opacity: 1;
      border-color: rgba(245, 245, 245, 0.5);
    }

    /* ===== Edit view ===== */

    .edit-view {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      z-index: 20;
      transition: opacity 0.4s ease;
    }

    .edit-view.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #script-input {
      width: 100%;
      max-width: 500px;
      min-height: 55vh;
      background: transparent;
      border: 1px solid rgba(245, 245, 245, 0.2);
      border-radius: 12px;
      padding: 1.5rem;
      font-family: inherit;
      font-weight: 400;
      font-size: 18px;
      line-height: 1.5;
      letter-spacing: 0.01em;
      color: #f5f5f5;
      resize: none;
      outline: none;
      -webkit-user-select: text;
      user-select: text;
      transition: border-color 0.2s ease;
    }

    #script-input:focus {
      border-color: rgba(245, 245, 245, 0.4);
    }

    #script-input::placeholder {
      color: rgba(245, 245, 245, 0.35);
    }

    .start-prompt {
      margin-top: 2rem;
      font-size: 1.25rem;
      font-weight: 300;
      letter-spacing: 0.02em;
      opacity: 0.85;
      cursor: pointer;
      padding: 1.5rem 2rem;
      border: 1px solid rgba(245, 245, 245, 0.3);
      border-radius: 999px;
      transition: opacity 0.2s ease, border-color 0.2s ease;
    }

    .start-prompt:active {
      opacity: 1;
      border-color: rgba(245, 245, 245, 0.6);
    }

    .start-prompt.muted {
      opacity: 0.3;
      pointer-events: none;
    }

    /* ===== Error overlay ===== */

    .error-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      text-align: center;
      z-index: 30;
    }

    .error-overlay.hidden {
      display: none;
    }

    .error-message {
      font-size: 1rem;
      font-weight: 300;
      max-width: 20rem;
      line-height: 1.6;
      opacity: 0.85;
    }

    .error-title {
      display: block;
      font-weight: 500;
      margin-bottom: 0.75rem;
      font-size: 1.125rem;
    }

    .retry-button {
      display: block;
      margin: 1.5rem auto 0;
      padding: 0.75rem 1.5rem;
      background: transparent;
      border: 1px solid rgba(245, 245, 245, 0.3);
      border-radius: 999px;
      color: inherit;
      font: inherit;
      font-size: 0.9375rem;
      cursor: pointer;
      transition: border-color 0.2s ease;
    }

    .retry-button:active {
      border-color: rgba(245, 245, 245, 0.6);
    }

    .retry-button.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <!-- Prompter layer -->
  <video id="camera" autoplay playsinline muted></video>
  <div class="tint" id="tint"></div>

  <div class="script-viewport" id="script-viewport">
    <div class="script-content" id="script-content"></div>
  </div>

  <div class="tap-zone" id="tap-zone"></div>
  <button class="edit-button" id="edit-button">edit</button>

  <!-- Edit view -->
  <div class="edit-view" id="edit-view">
    <textarea id="script-input" placeholder="paste your script"></textarea>
    <div id="start-prompt" class="start-prompt muted">tap to begin</div>
  </div>

  <!-- Error overlay -->
  <div class="error-overlay hidden" id="error-overlay">
    <div class="error-message">
      <span class="error-title" id="error-title"></span>
      <span id="error-body"></span>
      <button class="retry-button hidden" id="retry">try again</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'fingo:active-script';
    const DEFAULT_SCROLL_SPEED = 30; // pixels per second

    const video = document.getElementById('camera');
    const tint = document.getElementById('tint');
    const scriptViewport = document.getElementById('script-viewport');
    const scriptContent = document.getElementById('script-content');
    const tapZone = document.getElementById('tap-zone');
    const editButton = document.getElementById('edit-button');
    const editView = document.getElementById('edit-view');
    const scriptInput = document.getElementById('script-input');
    const startPrompt = document.getElementById('start-prompt');
    const errorOverlay = document.getElementById('error-overlay');
    const errorTitle = document.getElementById('error-title');
    const errorBody = document.getElementById('error-body');
    const retryBtn = document.getElementById('retry');

    let cameraReady = false;

    // ===== Scroll engine =====

    let scrollPosition = 0;
    let scrollSpeed = DEFAULT_SCROLL_SPEED;
    let scrollState = 'idle'; // 'idle' | 'scrolling' | 'paused' | 'ended'
    let scrollAnimationFrame = null;
    let lastFrameTime = null;

    function applyScrollPosition() {
      scriptContent.style.transform = `translateY(-${scrollPosition}px)`;
    }

    function resetScroll() {
      scrollPosition = 0;
      applyScrollPosition();
      scrollState = 'idle';
      if (scrollAnimationFrame) {
        cancelAnimationFrame(scrollAnimationFrame);
        scrollAnimationFrame = null;
      }
      lastFrameTime = null;
    }

    function scrollFrame(timestamp) {
      if (scrollState !== 'scrolling') {
        lastFrameTime = null;
        scrollAnimationFrame = null;
        return;
      }

      if (lastFrameTime !== null) {
        const delta = (timestamp - lastFrameTime) / 1000;
        scrollPosition += delta * scrollSpeed;
        applyScrollPosition();

        // End when content has scrolled past the screen
        const contentHeight = scriptContent.offsetHeight;
        const maxScroll = contentHeight + window.innerHeight * 0.5;
        if (scrollPosition >= maxScroll) {
          scrollState = 'ended';
          lastFrameTime = null;
          scrollAnimationFrame = null;
          return;
        }
      }

      lastFrameTime = timestamp;
      scrollAnimationFrame = requestAnimationFrame(scrollFrame);
    }

    function startScrolling() {
      if (scrollState === 'scrolling') return;
      scrollState = 'scrolling';
      lastFrameTime = null;
      scrollAnimationFrame = requestAnimationFrame(scrollFrame);
    }

    function pauseScrolling() {
      scrollState = 'paused';
    }

    function handleTapZoneClick() {
      switch (scrollState) {
        case 'idle':
        case 'paused':
          startScrolling();
          break;
        case 'scrolling':
          pauseScrolling();
          break;
        case 'ended':
          resetScroll();
          break;
      }
    }

    // ===== Edit/prompter view management =====

    function showEditView() {
      editView.classList.remove('hidden');
      editButton.classList.remove('active');
      tapZone.classList.remove('active');
      // Stop any active scrolling and reset position
      resetScroll();
    }

    function showPrompterView() {
      editView.classList.add('hidden');
      if (cameraReady) {
        editButton.classList.add('active');
        tapZone.classList.add('active');
      }
    }

    function updateStartPromptState() {
      const hasText = scriptInput.value.trim().length > 0;
      startPrompt.classList.toggle('muted', !hasText);
    }

    function syncScriptToPrompter() {
      scriptContent.textContent = scriptInput.value.trim();
      resetScroll();
    }

    // ===== localStorage =====

    function saveScript() {
      localStorage.setItem(STORAGE_KEY, scriptInput.value);
    }

    function loadScript() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        scriptInput.value = saved;
        updateStartPromptState();
      }
    }

    // ===== Camera =====

    function activatePrompter() {
      video.classList.add('active');
      tint.classList.add('active');
      scriptViewport.classList.add('active');
    }

    function showError(title, body, canRetry) {
      errorTitle.textContent = title;
      errorBody.textContent = body;
      retryBtn.classList.toggle('hidden', !canRetry);
      errorOverlay.classList.remove('hidden');
    }

    function hideError() {
      errorOverlay.classList.add('hidden');
    }

    async function initCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showError(
          'Camera not supported',
          'This browser does not support camera access. Try Safari on iOS or Chrome on Android.',
          false
        );
        return false;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user' },
          audio: false
        });

        video.srcObject = stream;

        return new Promise((resolve) => {
          video.addEventListener('playing', () => {
            activatePrompter();
            resolve(true);
          }, { once: true });
        });

      } catch (err) {
        console.error('Camera error:', err);

        if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
          showError(
            'Camera access denied',
            'The teleprompter uses the camera as a background so you can see your framing while reading. Allow camera access in your browser settings and try again.',
            true
          );
        } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
          showError(
            'No camera found',
            'No camera was detected on this device. The teleprompter is designed for phones with a front-facing camera.',
            false
          );
        } else {
          showError(
            'Camera unavailable',
            `Something went wrong: ${err.message || err.name || 'unknown error'}. Try refreshing the page.`,
            true
          );
        }
        return false;
      }
    }

    // ===== Event handlers =====

    async function handleStart() {
      const scriptText = scriptInput.value.trim();
      if (!scriptText) return;

      syncScriptToPrompter();

      if (!cameraReady) {
        const ok = await initCamera();
        if (!ok) return;
        cameraReady = true;
      }

      showPrompterView();
    }

    scriptInput.addEventListener('input', () => {
      saveScript();
      updateStartPromptState();
    });

    startPrompt.addEventListener('click', handleStart);
    editButton.addEventListener('click', showEditView);
    tapZone.addEventListener('click', handleTapZoneClick);
    retryBtn.addEventListener('click', () => {
      hideError();
      showEditView();
    });

    // ===== Init =====

    loadScript();
  </script>
</body>
</html>
