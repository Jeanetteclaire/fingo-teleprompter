<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Fingo Teleprompter</title>

  <!-- PWA: manifest + iOS standalone behaviour -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fingo">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="./icon-512.png">

  <!-- Manrope from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      color: #f5f5f5;
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== Prompter layer ===== */

    #camera {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      filter: blur(4px);
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    #camera.active {
      opacity: 1;
    }

    .tint {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      opacity: 0;
      transition: opacity 0.6s ease;
      z-index: 1;
      pointer-events: none;
    }

    .tint.active {
      opacity: 1;
    }

    .script-viewport {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 35vh;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .script-viewport.active {
      opacity: 1;
    }

    .script-content {
      width: 85%;
      max-width: 600px;
      text-align: center;
      font-weight: 500;
      font-size: 44px;
      line-height: 1.5;
      letter-spacing: 0.01em;
      color: #f5f5f5;
      white-space: pre-wrap;
      will-change: transform;
    }

    .tap-zone {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      background: transparent;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
      touch-action: none;
    }

    .tap-zone.active {
      opacity: 1;
      pointer-events: auto;
    }

    .edit-button {
      position: fixed;
      top: max(1rem, env(safe-area-inset-top));
      left: 1rem;
      padding: 0.5rem 1rem;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(245, 245, 245, 0.2);
      border-radius: 999px;
      color: #f5f5f5;
      font: inherit;
      font-size: 0.875rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      cursor: pointer;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.4s ease, border-color 0.2s ease;
      pointer-events: none;
    }

    .edit-button.active {
      opacity: 0.7;
      pointer-events: auto;
    }

    .edit-button:active {
      opacity: 1;
      border-color: rgba(245, 245, 245, 0.5);
    }

    /* ===== Speed slider ===== */

    .speed-control {
      position: fixed;
      bottom: max(2rem, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      width: 75%;
      max-width: 400px;
      z-index: 6;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .speed-control.active {
      opacity: 1;
      pointer-events: auto;
    }

    .speed-control.dim {
      opacity: 0.35;
    }

    .speed-slider {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      height: 36px;
      cursor: pointer;
      outline: none;
    }

    .speed-slider::-webkit-slider-runnable-track {
      width: 100%;
      height: 2px;
      background: rgba(245, 245, 245, 0.25);
      border-radius: 999px;
    }

    .speed-slider::-moz-range-track {
      width: 100%;
      height: 2px;
      background: rgba(245, 245, 245, 0.25);
      border-radius: 999px;
    }

    .speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #f5f5f5;
      margin-top: -10px;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .speed-slider::-webkit-slider-thumb:active {
      transform: scale(1.15);
    }

    .speed-slider::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #f5f5f5;
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .speed-slider::-moz-range-thumb:active {
      transform: scale(1.15);
    }

    /* ===== Edit view ===== */

    .edit-view {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: max(2rem, env(safe-area-inset-top)) 2rem max(3rem, env(safe-area-inset-bottom));
      z-index: 20;
      transition: opacity 0.4s ease;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .edit-view.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .edit-content {
      width: 100%;
      max-width: 500px;
      margin: auto 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #script-input {
      width: 100%;
      min-height: 45vh;
      background: transparent;
      border: 1px solid rgba(245, 245, 245, 0.2);
      border-radius: 12px;
      padding: 1.5rem;
      font-family: inherit;
      font-weight: 400;
      font-size: 18px;
      line-height: 1.5;
      letter-spacing: 0.01em;
      color: #f5f5f5;
      resize: none;
      outline: none;
      -webkit-user-select: text;
      user-select: text;
      transition: border-color 0.2s ease;
    }

    #script-input:focus {
      border-color: rgba(245, 245, 245, 0.4);
    }

    #script-input::placeholder {
      color: rgba(245, 245, 245, 0.35);
    }

    .input-actions {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.75rem;
      padding: 0 0.25rem;
    }

    .input-action {
      background: transparent;
      border: none;
      color: #f5f5f5;
      font: inherit;
      font-size: 0.9375rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      padding: 0.5rem 0.25rem;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s ease;
    }

    .input-action:active {
      opacity: 1;
    }

    .input-action.muted {
      opacity: 0.25;
      pointer-events: none;
    }

    .start-prompt {
      margin-top: 1.5rem;
      font-size: 1.25rem;
      font-weight: 300;
      letter-spacing: 0.02em;
      opacity: 0.85;
      cursor: pointer;
      padding: 1.5rem 2rem;
      border: 1px solid rgba(245, 245, 245, 0.3);
      border-radius: 999px;
      transition: opacity 0.2s ease, border-color 0.2s ease;
    }

    .start-prompt:active {
      opacity: 1;
      border-color: rgba(245, 245, 245, 0.6);
    }

    .start-prompt.muted {
      opacity: 0.3;
      pointer-events: none;
    }

    .history {
      width: 100%;
      margin-top: 2.5rem;
    }

    .history.hidden {
      display: none;
    }

    .history-header {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.5;
      margin-bottom: 0.75rem;
      padding: 0 0.25rem;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .history-item {
      width: 100%;
      text-align: left;
      background: transparent;
      border: 1px solid rgba(245, 245, 245, 0.12);
      border-radius: 10px;
      padding: 0.875rem 1rem;
      color: #f5f5f5;
      font: inherit;
      font-size: 0.9375rem;
      font-weight: 400;
      line-height: 1.4;
      cursor: pointer;
      opacity: 0.85;
      transition: opacity 0.2s ease, border-color 0.2s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-item:active {
      opacity: 1;
      border-color: rgba(245, 245, 245, 0.35);
    }

    /* ===== Error overlay ===== */

    .error-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      text-align: center;
      z-index: 30;
    }

    .error-overlay.hidden {
      display: none;
    }

    .error-message {
      font-size: 1rem;
      font-weight: 300;
      max-width: 20rem;
      line-height: 1.6;
      opacity: 0.85;
    }

    .error-title {
      display: block;
      font-weight: 500;
      margin-bottom: 0.75rem;
      font-size: 1.125rem;
    }

    .retry-button {
      display: block;
      margin: 1.5rem auto 0;
      padding: 0.75rem 1.5rem;
      background: transparent;
      border: 1px solid rgba(245, 245, 245, 0.3);
      border-radius: 999px;
      color: inherit;
      font: inherit;
      font-size: 0.9375rem;
      cursor: pointer;
      transition: border-color 0.2s ease;
    }

    .retry-button:active {
      border-color: rgba(245, 245, 245, 0.6);
    }

    .retry-button.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <!-- Prompter layer -->
  <video id="camera" autoplay playsinline muted></video>
  <div class="tint" id="tint"></div>

  <div class="script-viewport" id="script-viewport">
    <div class="script-content" id="script-content"></div>
  </div>

  <div class="tap-zone" id="tap-zone"></div>
  <button class="edit-button" id="edit-button">edit</button>

  <!-- Speed slider -->
  <div class="speed-control" id="speed-control">
    <input
      type="range"
      class="speed-slider"
      id="speed-slider"
      min="15"
      max="90"
      step="5"
      value="45"
      aria-label="scroll speed"
    >
  </div>

  <!-- Edit view -->
  <div class="edit-view" id="edit-view">
    <div class="edit-content">
      <textarea id="script-input" placeholder="paste your script"></textarea>

      <div class="input-actions">
        <button class="input-action muted" id="clear-button">clear</button>
        <button class="input-action muted" id="save-button">save</button>
      </div>

      <div id="start-prompt" class="start-prompt muted">tap to begin</div>

      <div class="history hidden" id="history">
        <div class="history-header">Saved</div>
        <div class="history-list" id="history-list"></div>
      </div>
    </div>
  </div>

  <!-- Error overlay -->
  <div class="error-overlay hidden" id="error-overlay">
    <div class="error-message">
      <span class="error-title" id="error-title"></span>
      <span id="error-body"></span>
      <button class="retry-button hidden" id="retry">try again</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'fingo:active-script';
    const HISTORY_STORAGE_KEY = 'fingo:script-history';
    const SPEED_STORAGE_KEY = 'fingo:scroll-speed';
    const HISTORY_MAX = 5;
    const DEFAULT_SCROLL_SPEED = 45;
    const MIN_SPEED = 15;
    const MAX_SPEED = 90;
    const TAP_THRESHOLD = 10;

    const video = document.getElementById('camera');
    const tint = document.getElementById('tint');
    const scriptViewport = document.getElementById('script-viewport');
    const scriptContent = document.getElementById('script-content');
    const tapZone = document.getElementById('tap-zone');
    const editButton = document.getElementById('edit-button');
    const speedControl = document.getElementById('speed-control');
    const speedSlider = document.getElementById('speed-slider');
    const editView = document.getElementById('edit-view');
    const scriptInput = document.getElementById('script-input');
    const startPrompt = document.getElementById('start-prompt');
    const saveButton = document.getElementById('save-button');
    const clearButton = document.getElementById('clear-button');
    const historyContainer = document.getElementById('history');
    const historyList = document.getElementById('history-list');
    const errorOverlay = document.getElementById('error-overlay');
    const errorTitle = document.getElementById('error-title');
    const errorBody = document.getElementById('error-body');
    const retryBtn = document.getElementById('retry');

    let cameraReady = false;

    // ===== Wake lock =====

    let wakeLockSentinel = null;
    let wakeLockDesired = false;

    async function requestWakeLock() {
      wakeLockDesired = true;

      if (!('wakeLock' in navigator)) {
        return;
      }

      try {
        wakeLockSentinel = await navigator.wakeLock.request('screen');
        wakeLockSentinel.addEventListener('release', () => {
          wakeLockSentinel = null;
        });
      } catch (err) {
        console.error('Wake lock request failed:', err);
        wakeLockSentinel = null;
      }
    }

    async function releaseWakeLock() {
      wakeLockDesired = false;
      if (wakeLockSentinel) {
        try {
          await wakeLockSentinel.release();
        } catch (err) {
          console.error('Wake lock release failed:', err);
        }
        wakeLockSentinel = null;
      }
    }

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && wakeLockDesired && !wakeLockSentinel) {
        requestWakeLock();
      }
    });

    // ===== Scroll engine =====

    let scrollPosition = 0;
    let scrollSpeed = DEFAULT_SCROLL_SPEED;
    let scrollState = 'idle';
    let scrollAnimationFrame = null;
    let lastFrameTime = null;

    function getMaxScroll() {
      return scriptContent.offsetHeight + window.innerHeight * 0.5;
    }

    function clampScrollPosition() {
      const max = getMaxScroll();
      scrollPosition = Math.max(0, Math.min(scrollPosition, max));
    }

    function applyScrollPosition() {
      scriptContent.style.transform = `translateY(-${scrollPosition}px)`;
    }

    function resetScroll() {
      scrollPosition = 0;
      applyScrollPosition();
      scrollState = 'idle';
      if (scrollAnimationFrame) {
        cancelAnimationFrame(scrollAnimationFrame);
        scrollAnimationFrame = null;
      }
      lastFrameTime = null;
      updateSpeedControlDim();
    }

    function scrollFrame(timestamp) {
      if (scrollState !== 'scrolling') {
        lastFrameTime = null;
        scrollAnimationFrame = null;
        return;
      }

      if (lastFrameTime !== null) {
        const delta = (timestamp - lastFrameTime) / 1000;
        scrollPosition += delta * scrollSpeed;
        applyScrollPosition();

        if (scrollPosition >= getMaxScroll()) {
          scrollState = 'ended';
          lastFrameTime = null;
          scrollAnimationFrame = null;
          updateSpeedControlDim();
          return;
        }
      }

      lastFrameTime = timestamp;
      scrollAnimationFrame = requestAnimationFrame(scrollFrame);
    }

    function startScrolling() {
      if (scrollState === 'scrolling') return;
      if (scrollState === 'ended') {
        resetScroll();
        return;
      }
      scrollState = 'scrolling';
      lastFrameTime = null;
      scrollAnimationFrame = requestAnimationFrame(scrollFrame);
      updateSpeedControlDim();
    }

    function pauseScrolling() {
      scrollState = 'paused';
      updateSpeedControlDim();
    }

    function handleTap() {
      switch (scrollState) {
        case 'idle':
        case 'paused':
          startScrolling();
          break;
        case 'scrolling':
          pauseScrolling();
          break;
        case 'ended':
          resetScroll();
          break;
      }
    }

    // ===== Pointer (tap/swipe) handling =====

    let activePointerId = null;
    let pointerStartY = null;
    let pointerPreviousY = null;
    let totalAbsMovement = 0;
    let isSwiping = false;

    function handlePointerDown(e) {
      if (activePointerId !== null) return;
      activePointerId = e.pointerId;
      pointerStartY = e.clientY;
      pointerPreviousY = pointerStartY;
      totalAbsMovement = 0;
      isSwiping = false;
      tapZone.setPointerCapture(e.pointerId);
    }

    function handlePointerMove(e) {
      if (e.pointerId !== activePointerId) return;

      const deltaThisFrame = pointerPreviousY - e.clientY;
      totalAbsMovement += Math.abs(deltaThisFrame);

      if (!isSwiping && totalAbsMovement >= TAP_THRESHOLD) {
        isSwiping = true;
        if (scrollState === 'scrolling') pauseScrolling();
        if (scrollState === 'ended') scrollState = 'paused';
        scrollPosition += pointerStartY - e.clientY;
        clampScrollPosition();
        applyScrollPosition();
      } else if (isSwiping) {
        scrollPosition += deltaThisFrame;
        clampScrollPosition();
        applyScrollPosition();
      }

      pointerPreviousY = e.clientY;
    }

    function handlePointerUp(e) {
      if (e.pointerId !== activePointerId) return;

      if (!isSwiping) {
        handleTap();
      }

      tapZone.releasePointerCapture(e.pointerId);
      activePointerId = null;
      pointerStartY = null;
      pointerPreviousY = null;
      totalAbsMovement = 0;
      isSwiping = false;
    }

    // ===== Speed control =====

    function updateSpeedControlDim() {
      speedControl.classList.toggle('dim', scrollState === 'scrolling');
    }

    function handleSpeedChange() {
      const value = Number(speedSlider.value);
      if (Number.isFinite(value)) {
        scrollSpeed = value;
        persistSpeed(value);
      }
    }

    function persistSpeed(value) {
      try {
        localStorage.setItem(SPEED_STORAGE_KEY, String(value));
      } catch (err) {
        console.error('Speed save error:', err);
      }
    }

    function loadSpeed() {
      try {
        const raw = localStorage.getItem(SPEED_STORAGE_KEY);
        if (raw === null) return;
        const value = Number(raw);
        if (Number.isFinite(value) && value >= MIN_SPEED && value <= MAX_SPEED) {
          scrollSpeed = value;
          speedSlider.value = String(value);
        }
      } catch (err) {
        console.error('Speed load error:', err);
      }
    }

    // ===== Edit/prompter view management =====

    function showEditView() {
      editView.classList.remove('hidden');
      editButton.classList.remove('active');
      tapZone.classList.remove('active');
      speedControl.classList.remove('active');
      resetScroll();
      releaseWakeLock();
    }

    function showPrompterView() {
      editView.classList.add('hidden');
      if (cameraReady) {
        editButton.classList.add('active');
        tapZone.classList.add('active');
        speedControl.classList.add('active');
        requestWakeLock();
      }
    }

    function updateInputActionStates() {
      const hasText = scriptInput.value.trim().length > 0;
      startPrompt.classList.toggle('muted', !hasText);
      saveButton.classList.toggle('muted', !hasText);
      clearButton.classList.toggle('muted', !hasText);
    }

    function syncScriptToPrompter() {
      scriptContent.textContent = scriptInput.value.trim();
      resetScroll();
    }

    // ===== Active-script localStorage =====

    function saveActiveScript() {
      localStorage.setItem(STORAGE_KEY, scriptInput.value);
    }

    function loadActiveScript() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        scriptInput.value = saved;
        updateInputActionStates();
      }
    }

    function clearActiveScript() {
      scriptInput.value = '';
      localStorage.removeItem(STORAGE_KEY);
      updateInputActionStates();
    }

    // ===== History =====

    function loadHistory() {
      try {
        const raw = localStorage.getItem(HISTORY_STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (err) {
        console.error('History load error:', err);
        return [];
      }
    }

    function persistHistory(history) {
      try {
        localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(history));
      } catch (err) {
        console.error('History save error:', err);
      }
    }

    function firstLineOf(text) {
      const firstLine = text.split('\n').find(line => line.trim().length > 0) || '';
      return firstLine.trim();
    }

    function addCurrentToHistory() {
      const content = scriptInput.value.trim();
      if (!content) return;

      const history = loadHistory();

      if (history.length > 0 && history[0].content === content) return;

      history.unshift({
        id: Date.now().toString(),
        content,
        label: firstLineOf(content),
        savedAt: new Date().toISOString()
      });

      while (history.length > HISTORY_MAX) {
        history.pop();
      }

      persistHistory(history);
      renderHistory();
    }

    function loadFromHistory(id) {
      const history = loadHistory();
      const item = history.find(h => h.id === id);
      if (!item) return;
      scriptInput.value = item.content;
      saveActiveScript();
      updateInputActionStates();
      editView.scrollTop = 0;
    }

    function renderHistory() {
      const history = loadHistory();

      if (history.length === 0) {
        historyContainer.classList.add('hidden');
        historyList.innerHTML = '';
        return;
      }

      historyContainer.classList.remove('hidden');
      historyList.innerHTML = '';

      history.forEach(item => {
        const button = document.createElement('button');
        button.className = 'history-item';
        button.textContent = item.label || '(empty)';
        button.dataset.id = item.id;
        button.addEventListener('click', () => loadFromHistory(item.id));
        historyList.appendChild(button);
      });
    }

    // ===== Camera =====

    function activatePrompter() {
      video.classList.add('active');
      tint.classList.add('active');
      scriptViewport.classList.add('active');
    }

    function showError(title, body, canRetry) {
      errorTitle.textContent = title;
      errorBody.textContent = body;
      retryBtn.classList.toggle('hidden', !canRetry);
      errorOverlay.classList.remove('hidden');
    }

    function hideError() {
      errorOverlay.classList.add('hidden');
    }

    async function initCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showError(
          'Camera not supported',
          'This browser does not support camera access. Try Safari on iOS or Chrome on Android.',
          false
        );
        return false;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user' },
          audio: false
        });

        video.srcObject = stream;

        return new Promise((resolve) => {
          video.addEventListener('playing', () => {
            activatePrompter();
            resolve(true);
          }, { once: true });
        });

      } catch (err) {
        console.error('Camera error:', err);

        if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
          showError(
            'Camera access denied',
            'The teleprompter uses the camera as a background so you can see your framing while reading. Allow camera access in your browser settings and try again.',
            true
          );
        } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
          showError(
            'No camera found',
            'No camera was detected on this device. The teleprompter is designed for phones with a front-facing camera.',
            false
          );
        } else {
          showError(
            'Camera unavailable',
            `Something went wrong: ${err.message || err.name || 'unknown error'}. Try refreshing the page.`,
            true
          );
        }
        return false;
      }
    }

    // ===== Event handlers =====

    async function handleStart() {
      const scriptText = scriptInput.value.trim();
      if (!scriptText) return;

      syncScriptToPrompter();

      if (!cameraReady) {
        const ok = await initCamera();
        if (!ok) return;
        cameraReady = true;
      }

      showPrompterView();
    }

    scriptInput.addEventListener('input', () => {
      saveActiveScript();
      updateInputActionStates();
    });

    startPrompt.addEventListener('click', handleStart);
    editButton.addEventListener('click', showEditView);
    saveButton.addEventListener('click', addCurrentToHistory);
    clearButton.addEventListener('click', clearActiveScript);

    tapZone.addEventListener('pointerdown', handlePointerDown);
    tapZone.addEventListener('pointermove', handlePointerMove);
    tapZone.addEventListener('pointerup', handlePointerUp);
    tapZone.addEventListener('pointercancel', handlePointerUp);

    speedSlider.addEventListener('input', handleSpeedChange);

    retryBtn.addEventListener('click', () => {
      hideError();
      showEditView();
    });

    // ===== Init =====

    loadSpeed();
    loadActiveScript();
    renderHistory();
  </script>
</body>
</html>
